<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro Familias – CIS Madrid</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <link rel="stylesheet" href="/css/estilos_portal.css" />
</head>
<body class="login-page">
  <div class="login-box login-box--lg">
    <h2>Crear Cuenta</h2>
    <p>Date de alta en tu panel privado para empezar a organizar tus citas e historial.</p>
    
    <form id="registroForm" class="login-form" novalidate>
      <div class="form-row">
        <div class="form-group">
          <label for="nombre">Nombre tutor legal</label>
          <input type="text" id="nombre" required placeholder="Ej. Marina" />
        </div>
        <div class="form-group">
          <label for="apellido">Apellido(s)</label>
          <input type="text" id="apellido" required placeholder="Ej. López" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group" style="width: 100%;">
          <label for="tlf">Teléfono</label>
          <input type="tel" id="tlf" required placeholder="Ej: 612345678 o 912345678" />
        </div>
      </div>
      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" required placeholder="Usado para enviar informes" />
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" required placeholder="Mínimo 8 caracteres" />
      </div>
      <button type="submit" class="btn btn-primary mt-md">Crear perfil familiar</button>
    </form>
    
    <div class="login-links">
      ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a><br><br>
      <a href="index.html" class="link-muted">← Volver a la web pública</a>
    </div>
  </div>

<script src="/js/config.js"></script>
<script defer src="/js/main.js"></script>
</body>
</html>

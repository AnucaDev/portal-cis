<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acceso Familias – CIS Madrid</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <link rel="stylesheet" href="/css/estilos_portal.css" />
</head>
<body class="login-page">
  <div class="login-box">
    <div class="login-logo">
      <img class="logo-svg" src="/imagenes/logo.svg" alt="Logotipo CIS" />
    </div>
    <h2>Área de Familias</h2>
    <p>Inicia sesión para gestionar citas, leer informes y consultar tu historial.</p>
    
    <form id="loginForm" class="login-form" novalidate>
      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" required placeholder="tuemail@ejemplo.com" />
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" required placeholder="••••••••" />
      </div>
      <button type="submit" class="btn btn-primary mt-sm">Entrar al portal</button>
    </form>
    
    <div class="login-links">
      ¿Aún no tienes cuenta? <a href="registro.html">Regístrate aquí</a><br><br>
      <a href="index.html" class="link-muted">← Volver a la web pública</a>
    </div>
  </div>

<script src="/js/config.js"></script>
<script defer src="/js/main.js"></script>
</body>
</html>
